[package]
name = "redis_interface"
description = "A user-friendly interface to Redis"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
readme = "README.md"
license.workspace = true

[features]
multitenancy_fallback = []

[dependencies]
error-stack = "0.4.1"
fred = { git = "https://github.com/hrithikesh026/fred.rs.git", branch = "add-logs-8-0-6", features = ["metrics", "partial-tracing", "subscriber-client"] }
futures = "0.3"
serde = { version = "1.0.219", features = ["derive"] }
thiserror = "1.0.69"
tokio = { workspace = true }
tokio-stream = { version = "0.1.17", features = ["sync"] }
tracing = { workspace = true }

# First party crates
common_utils = { version = "0.1.0", path = "../common_utils", features = ["async_ext"] }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }

[lints]
workspace = true
