name: Extended Cypress

on:
  merge_group:
    types:
      - checks_requested
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  PAYMENTS_CONNECTORS_BATCH_1: "stripe cybersource adyen authorizedotnet bluesnap"
  PAYMENTS_CONNECTORS_BATCH_2: "calida finix fiuu gigadat iatapay"
  PAYMENTS_CONNECTORS_BATCH_3: "loonio nexixpay nmi noon"
  PAYMENTS_CONNECTORS_BATCH_4: "paypal peachpayments redsys zift"
  PAYOUTS_CONNECTORS:  "adyenplatform wise"
  PLATFORM_CONNECTORS: "stripe cybersource"
  RUST_BACKTRACE: short
  RUSTUP_MAX_RETRIES: 10
  RUN_TESTS: ${{ ((github.event_name == 'pull_request') && (github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name)) || (github.event_name == 'merge_group')}}
  DEBUG: cypress:cli
  RUST_MIN_STACK: 11534336

jobs:
  configure:
    name: Configure run
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
    steps:
      - name: Decide whether to run
        id: gate
        shell: bash
        env:
          # Toggle between iteration mode and production mode.
          #   'always'           : run on PR + merge_group (use while iterating on this workflow itself)
          #   'merge-queue-only' : run only on merge_group; PR triggers exit instantly with no work
          # Once this workflow is stable, flip to 'merge-queue-only'.
          RUN_MODE: 'always'
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [[ "$EVENT_NAME" == "merge_group" ]] || \
             [[ "$EVENT_NAME" == "pull_request" && "$RUN_MODE" == "always" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  build-hyperswitch:
    name: Build hyperswitch server
    needs: configure
    if: needs.configure.outputs.should_run == 'true'
    runs-on: hyperswitch-runners
    env:
      # Use `sccache` for caching compilation artifacts
      RUSTC_WRAPPER: sccache
    steps:
      - name: Skip tests for PRs from forks
        shell: bash
        if: ${{ env.RUN_TESTS == 'false' }}
        run: echo 'Skipping tests for PRs from forks'

      - name: Checkout repository
        if: ${{ env.RUN_TESTS == 'true' }}
        uses: actions/checkout@v5

      - name: Install mold linker
        if: ${{ env.RUN_TESTS == 'true' }}
        uses: rui314/setup-mold@v1
        with:
          make-default: true

      - name: Install Rust
        if: ${{ env.RUN_TESTS == 'true' }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable 2 weeks ago
          components: clippy

      - name: Install Protoc
        if: ${{ env.RUN_TESTS == 'true' }}
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install sccache
        if: ${{ env.RUN_TESTS == 'true' }}
        uses: taiki-e/install-action@v2
        with:
          tool: sccache
          checksum: true

      - name: Build project
        if: ${{ env.RUN_TESTS == 'true' }}
        run: cargo build --package router --bin router --jobs 2

      - name: Upload binary artifact
        if: ${{ env.RUN_TESTS == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: hyperswitch-server-extended
          overwrite: true
          path: target/debug/router
          retention-days: 1

  prepare-matrix:
    name: Prepare extended connector matrix
    needs: configure
    if: needs.configure.outputs.should_run == 'true'
    runs-on: hyperswitch-runners
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set matrix for extended connector batches
        id: set-matrix
        shell: bash
        run: |
          {
            echo "matrix<<EOF"
            echo '{
              "batch": [
                {
                  "name": "payments-batch-1",
                  "payments_connectors": "'"${PAYMENTS_CONNECTORS_BATCH_1}"'",
                  "payouts_connectors": "",
                  "platform_connectors": "",
                  "parallel": 5,
                  "report_artifact_name": "extended-cypress-results-payments-1",
                  "server_logs_artifact": "extended-server-logs-payments-1"
                },
                {
                  "name": "payments-batch-2",
                  "payments_connectors": "'"${PAYMENTS_CONNECTORS_BATCH_2}"'",
                  "payouts_connectors": "",
                  "platform_connectors": "",
                  "parallel": 5,
                  "report_artifact_name": "extended-cypress-results-payments-2",
                  "server_logs_artifact": "extended-server-logs-payments-2"
                },
                {
                  "name": "payments-batch-3",
                  "payments_connectors": "'"${PAYMENTS_CONNECTORS_BATCH_3}"'",
                  "payouts_connectors": "",
                  "platform_connectors": "",
                  "parallel": 5,
                  "report_artifact_name": "extended-cypress-results-payments-3",
                  "server_logs_artifact": "extended-server-logs-payments-3"
                },
                {
                  "name": "payments-batch-4",
                  "payments_connectors": "'"${PAYMENTS_CONNECTORS_BATCH_4}"'",
                  "payouts_connectors": "",
                  "platform_connectors": "",
                  "parallel": 5,
                  "report_artifact_name": "extended-cypress-results-payments-4",
                  "server_logs_artifact": "extended-server-logs-payments-4"
                },
                {
                  "name": "payouts",
                  "payments_connectors": "",
                  "payouts_connectors": "'"${PAYOUTS_CONNECTORS}"'",
                  "platform_connectors": "",
                  "parallel": 2,
                  "report_artifact_name": "extended-cypress-results-payouts",
                  "server_logs_artifact": "extended-server-logs-payouts"
                },
                {
                  "name": "platform",
                  "payments_connectors": "",
                  "payouts_connectors": "",
                  "platform_connectors": "'"${PLATFORM_CONNECTORS}"'",
                  "parallel": 2,
                  "report_artifact_name": "extended-cypress-results-platform",
                  "server_logs_artifact": "extended-server-logs-platform"
                }
              ]
            }'
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  cypress-tests:
    name: Run Extended Cypress tests
    needs: [configure, build-hyperswitch, prepare-matrix]
    if: needs.configure.outputs.should_run == 'true'
    permissions:
      pull-requests: write
    runs-on: hyperswitch-runners
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
    env:
      # Use `sccache` for caching compilation artifacts
      RUSTC_WRAPPER: sccache

    services:
      redis:
        image: "public.ecr.aws/docker/library/redis:alpine"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
      postgres:
        image: "public.ecr.aws/docker/library/postgres:alpine"
        env:
          POSTGRES_USER: db_user
          POSTGRES_PASSWORD: db_pass
          POSTGRES_DB: hyperswitch_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Skip tests for PRs from forks
        if: ${{ env.RUN_TESTS == 'false' }}
        shell: bash
        run: echo 'Skipping tests for PRs from forks'

      - name: Checkout repository
        if: ${{ env.RUN_TESTS == 'true' }}
        uses: actions/checkout@v5

      - name: Install Rust
        if: ${{ env.RUN_TESTS == 'true' }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable 2 weeks ago
          components: rustfmt

      - name: Install sccache
        if: ${{ env.RUN_TESTS == 'true' }}
        uses: taiki-e/install-action@v2
        with:
          tool: sccache
          checksum: true

      - name: Download hyperswitch server artifact
        if: ${{ env.RUN_TESTS == 'true' }}
        uses: actions/download-artifact@v8
        with:
          name: hyperswitch-server-extended
          path: target/debug

      - name: Make server executable
        if: ${{ env.RUN_TESTS == 'true' }}
        run: chmod +x target/debug/router

      - name: Download Encrypted TOML from S3 and Decrypt
        if: ${{ env.RUN_TESTS == 'true' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CONNECTOR_CREDS_AWS_ACCESS_KEY_ID }}
          AWS_REGION: ${{ secrets.CONNECTOR_CREDS_AWS_REGION }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CONNECTOR_CREDS_AWS_SECRET_ACCESS_KEY }}
          CONNECTOR_AUTH_PASSPHRASE: ${{ secrets.CONNECTOR_AUTH_PASSPHRASE }}
          CONNECTOR_CREDS_S3_BUCKET_URI: ${{ secrets.CONNECTOR_CREDS_S3_BUCKET_URI}}
          DESTINATION_FILE_NAME: "creds.json.gpg"
          S3_SOURCE_FILE_NAME: "68bba6ea-3c75-440f-9c4b-00a30ecbb79d.json.gpg"
        shell: bash
        run: |
          mkdir -p ".github/secrets" ".github/test"

          aws s3 cp "${CONNECTOR_CREDS_S3_BUCKET_URI}/${S3_SOURCE_FILE_NAME}" ".github/secrets/${DESTINATION_FILE_NAME}"
          gpg --quiet --batch --yes --decrypt --passphrase="${CONNECTOR_AUTH_PASSPHRASE}" --output ".github/test/creds.json" ".github/secrets/${DESTINATION_FILE_NAME}"

      - name: Set paths in env
        if: ${{ env.RUN_TESTS == 'true' }}
        shell: bash
        run: |
          echo "CYPRESS_CONNECTOR_AUTH_FILE_PATH=${{ github.workspace }}/.github/test/creds.json" >> $GITHUB_ENV
          echo "SERVER_LOG_PATH=${{ github.workspace }}/server-logs.txt" >> $GITHUB_ENV

      - name: Fetch keys
        if: ${{ env.RUN_TESTS == 'true' }}
        env:
          TOML_PATH: "./config/development.toml"
        run: |
          LOCAL_ADMIN_API_KEY=$(yq '.secrets.admin_api_key' ${TOML_PATH})
          echo "CYPRESS_ADMINAPIKEY=${LOCAL_ADMIN_API_KEY}" >> $GITHUB_ENV

      - name: Install Diesel CLI
        if: ${{ env.RUN_TESTS == 'true' }}
        uses: baptiste0928/cargo-install@v3.3.0
        with:
          crate: diesel_cli
          features: postgres
          args: --no-default-features

      - name: Install Just
        if: ${{ env.RUN_TESTS == 'true' }}
        uses: taiki-e/install-action@v2
        with:
          tool: just
          checksum: true

      - name: Install Node.js
        if: ${{ env.RUN_TESTS == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Cypress and dependencies
        if: ${{ env.RUN_TESTS == 'true' }}
        run: |
          npm ci --prefix ./cypress-tests

      - name: Run database migrations
        if: ${{ env.RUN_TESTS == 'true' }}
        shell: bash
        env:
          DATABASE_URL: postgres://db_user:db_pass@localhost:5432/hyperswitch_db
        run: just migrate run --locked-schema

      - name: Insert card info into the database
        if: ${{ env.RUN_TESTS == 'true' }}
        run: |
          PGPASSWORD=db_pass psql --host=localhost --port=5432 --username=db_user --dbname=hyperswitch_db --command "\copy cards_info FROM '.github/data/cards_info.csv' DELIMITER ',' CSV HEADER;"

      - name: Insert GSM info into the database
        if: ${{ env.RUN_TESTS == 'true' }}
        run: |
          PGPASSWORD=db_pass psql --host=localhost --port=5432 --username=db_user --dbname=hyperswitch_db --command "\copy gateway_status_map FROM '.github/data/gateway_status_map.csv' DELIMITER ',' CSV HEADER;"

      - name: Setup Local Server
        if: ${{ env.RUN_TESTS == 'true' }}
        env:
          ROUTER__APPLEPAY_DECRYPT_KEYS__APPLE_PAY_PPC: ${{ secrets.APPLE_PAY_PAYMENT_PROCESSING_CERTIFICATE }}
          ROUTER__APPLEPAY_DECRYPT_KEYS__APPLE_PAY_PPC_KEY: ${{ secrets.APPLE_PAY_PAYMENT_PROCESSING_CERTIFICATE_KEY }}
          ROUTER__APPLEPAY_DECRYPT_KEYS__APPLE_PAY_MERCHANT_CERT: ${{ secrets.APPLE_PAY_MERCHANT_CERTIFICATE }}
          ROUTER__APPLEPAY_DECRYPT_KEYS__APPLE_PAY_MERCHANT_CERT_KEY: ${{ secrets.APPLE_PAY_MERCHANT_CERTIFICATE_KEY }}
          SERVER_LOG_PATH: ${{ github.workspace }}/server-logs.txt
        run: |
          # Start the server in the background

          target/debug/router >> "${{ env.SERVER_LOG_PATH }}" 2>&1 &
          SERVER_PID=$!
          echo "PID=${SERVER_PID}" >> $GITHUB_ENV

           # Wait for the server to start in port 8080
          COUNT=0
          while ! nc -z localhost 8080; do
            if [ $COUNT -gt 12 ]; then # Wait for up to 2 minutes (12 * 10 seconds)
              echo "Server did not start within a reasonable time. Exiting."
              kill ${SERVER_PID}
              exit 1
            else
              COUNT=$((COUNT+1))
              sleep 10
            fi
          done

      - name: Run Cypress tests
        if: ${{ env.RUN_TESTS == 'true' }}
        env:
          CYPRESS_BASEURL: "http://localhost:8080"
          ROUTER__SERVER__WORKERS: 4
          PAYMENTS_CONNECTORS: "${{ matrix.batch.payments_connectors }}"
          PAYOUTS_CONNECTORS:  "${{ matrix.batch.payouts_connectors }}"
          PLATFORM_CONNECTORS: "${{ matrix.batch.platform_connectors }}"
        shell: bash -leuo pipefail {0}
        run: |
          scripts/execute_cypress.sh --parallel ${{ matrix.batch.parallel }}

          kill "${{ env.PID }}"

      - name: Upload server logs on failure
        if: env.RUN_TESTS == 'true' && failure()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.batch.server_logs_artifact }}
          path: ${{ env.SERVER_LOG_PATH }}
          if-no-files-found: ignore
          retention-days: 1

      - name: Upload Cypress test results
        if: env.RUN_TESTS == 'true' && failure()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.batch.report_artifact_name }}
          path: |
            cypress-tests/cypress/reports/
          retention-days: 1

  consolidated-result:
    name: Extended Cypress — Consolidated Result
    needs: [configure, cypress-tests]
    runs-on: ubuntu-latest
    if: needs.configure.outputs.should_run == 'true' && !cancelled()
    permissions:
      pull-requests: write
    steps:
      - name: Evaluate Matrix Results
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RESULT="${{ needs.cypress-tests.result }}"
          RUN_TESTS_VAL="${{ env.RUN_TESTS }}"

          echo "extended-cypress result: $RESULT"
          echo "Run tests env: $RUN_TESTS_VAL"

          if [ "$RUN_TESTS_VAL" == "false" ]; then
            echo "Tests were skipped (Fork PR). Marking as success."
            exit 0
          fi

          if [ "$RESULT" == "success" ]; then
            echo "All extended cypress tests passed."
            exit 0
          else
            echo "Extended cypress tests failed."
            exit 1
          fi
