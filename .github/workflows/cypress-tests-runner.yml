          for connector in ${{ env.ALPHA_PAYMENTS_CONNECTORS }}; do
            CONNECTOR_ENV_VAR="ROUTER__CONNECTORS__$(echo ${connector} | tr '[:lower:]' '[:upper:]')__BASE_URL"
