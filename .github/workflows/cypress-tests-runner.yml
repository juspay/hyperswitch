        run: bash scripts/seed_superposition.sh

      - name: Start mock servers for alpha connectors
        if: ${{ env.RUN_TESTS == 'true' }}
        run: |
          echo "Starting mock server for ${connector}"
          cd cypress-tests

          npm run mockserver &

          MOCK_PID=$!
