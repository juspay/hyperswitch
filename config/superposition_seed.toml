[dimensions.organization_id]
position = 1
schema = { type = "string" }
description = "Organization identifier"
change_reason = "Initial setup"

[dimensions.provider_merchant_id]
position = 2
schema = { type = "string" }
description = "Provider merchant identifier (hyperswitch merchant id)"
change_reason = "Initial setup"

[dimensions.processor_merchant_id]
position = 3
schema = { type = "string" }
description = "Processor merchant identifier (connector-side merchant id)"
change_reason = "Initial setup"

[dimensions.profile_id]
position = 4
schema = { type = "string" }
description = "Business profile identifier"
change_reason = "Initial setup"

[dimensions.connector]
position = 5
schema = { type = "string" }
description = "Payment connector identifier (e.g. stripe, adyen)"
change_reason = "Initial setup"

[dimensions.currency]
position = 6
schema = { type = "string" }
description = "Payment currency (e.g. USD, JPY)"
change_reason = "Initial setup"

[default-configs.requires_cvv]
value = true
schema = { type = "boolean" }
description = "Whether CVV is required for payments"
change_reason = "Initial setup"

[default-configs.implicit_customer_update]
value = false
schema = { type = "boolean" }
description = "Whether to implicitly update customer details on payment"
change_reason = "Initial setup"

[default-configs.payout_tracker_mapping]
schema = { type = "object" }
description = "Payout sync retry mapping configuration per connector"
change_reason = "Initial setup"

[default-configs.payout_tracker_mapping.value]
start_after = 60
frequencies = [[300, 5]]

[default-configs.client_session_validation_enabled]
value = true
schema = { type = "boolean" }
description = "Whether client session validation is enabled for payments"
change_reason = "Initial setup"

[default-configs.installment_config_supported]
value = false
schema = { type = "boolean" }
description = "Whether installment payments are supported for a given connector and currency combination"
change_reason = "Initial setup"

[default-configs.refund]
schema = { type = "object" }
description = "Refund configuration: max_attempts and max_age"
change_reason = "Initial setup"

[default-configs.refund.value]
max_attempts = 10
max_age = 365

[default-configs.eph_key_validity]
schema = { type = "object" }
description = "Eph key Validity in hours configuration"
change_reason = "Initial setup"

[default-configs.eph_key_validity.value]
validity = 1
[default-configs.should_call_gsm]
value = false
schema = { type = "boolean" }
description = "Whether to call GSM (Global Status Mapping) for auto-retries on payment failure"
change_reason = "Initial setup"

[default-configs.should_perform_eligibility]
value = false
schema = { type = "boolean" }
description = "Whether the SDK should perform an eligibility check before confirming payment"
change_reason = "Initial setup"

[default-configs.should_enable_mit_with_limited_card_data]
value = false
schema = { type = "boolean" }
description = "Whether to allow merchant-initiated transactions (MIT) with limited card data"
change_reason = "Initial setup"

[default-configs.should_store_eligibility_check_data_for_authentication]
value = false
schema = { type = "boolean" }
description = "Whether to store eligibility check data during authentication"
change_reason = "Initial setup"

[default-configs.enable_extended_card_bin]
value = false
schema = { type = "boolean" }
description = "Whether to use extended card BIN (8-digit) for payment method data"
change_reason = "Initial setup"

[default-configs.max_auto_payout_retries]
value = 0
schema = { type = "integer", minimum = 0, maximum = 4294967295 }
description = "Maximum auto payout retries, differentiated by payout_retry_type dimension (single_connector or multi_connector)"
change_reason = "Initial setup"

[default-configs.webhooks]
schema = { type = "object" }
description = "Webhook settings: outgoing_enabled and redis_lock_expiry_seconds"
change_reason = "Initial setup"

[default-configs.webhooks.value]
outgoing_enabled = true
redis_lock_expiry_seconds = 180

[default-configs.network_transaction_id_supported_connector]
value = false
schema = { type = "boolean" }
description = "Whether the connector supports network transaction ID based MIT flow"
change_reason = "Initial setup"

[default-configs.card_only_mit_supported_connector]
value = false
schema = { type = "boolean" }
description = "Whether the connector supports Cards only MIT flow"
change_reason = "Initial setup"

[default-configs.dispute_supported_connector]
value = false
schema = { type = "boolean" }
description = "Whether the connector supports dispute flow"
change_reason = "Initial setup"

[default-configs.authentication_service_enabled_connector]
value = false
schema = { type = "boolean" }
description = "Whether the connector supports authentication service (UAS) flow"
change_reason = "Initial setup"

[default-configs.payout_eligibility]
value = true
schema = { type = "boolean" }
description = "Default eligibility of a payout method when the connector does not provide payout eligibility checks"
change_reason = "Initial setup"

[default-configs.l2_l3_data_enabled]
value = true
schema = { type = "boolean" }
description = "Whether to populate L2/L3 line-item and tax data when constructing payment router data"
change_reason = "Initial setup"

[default-configs.debit_routing_supported]
value = false
schema = { type = "boolean" }
description = "Whether debit routing is supported for a given connector, network, or currency combination"
change_reason = "Initial setup"

[default-configs.is_frm_enabled]
value = true
schema = { type = "boolean" }
description = "Whether FRM is enabled"
change_reason = "Initial setup"

[default-configs.merchant_advice_codes]
schema = { type = "object" }
description = "Mapping of card network advice codes to recommended retry actions for MIT transactions"
change_reason = "Initial setup"

[default-configs.merchant_advice_codes.value.visa]
"01" = { recommended_action = "do_not_retry", description = "The issuer will never approve (do not reattempt with the same card)" }
"02" = { recommended_action = "retry_later", description = "The issuer cannot approve at this time (limit the reattempts with the same card to a maximum of 20 times within 30 days)" }
"03" = { recommended_action = "retry_after_instrument_update", description = "Data quality (monitor for fraud attacks, revalidate the customer data prior to reattempt for a maximum of 20 times within 30 days)" }
"04" = { recommended_action = "retry_later", description = "Generic response codes (limit the reattempts with the same card to a maximum of 20 times within 30 days)" }

[default-configs.merchant_advice_codes.value.mastercard]
"01" = { recommended_action = "retry_after_instrument_update", description = "New account information available" }
"02" = { recommended_action = "retry_later", description = "Cannot approve at this time, try again later" }
"03" = { recommended_action = "do_not_retry", description = "Do not try again" }
"04" = { recommended_action = "retry_with_different_payment_method_data", description = "Token not supported" }
"05" = { recommended_action = "do_not_retry", description = "Negotiated value not approved" }
"21" = { recommended_action = "stop_recurring", description = "Stop recurring payment" }
"22" = { recommended_action = "do_not_retry", description = "Merchant does not qualify for product code" }
"24" = { recommended_action = "retry_after_1_hour", description = "Retry after 1 hour" }
"25" = { recommended_action = "retry_after_24_hours", description = "Retry after 24 hours" }
"26" = { recommended_action = "retry_after_2_days", description = "Retry after 2 days" }
"27" = { recommended_action = "retry_after_4_days", description = "Retry after 4 days" }
"28" = { recommended_action = "retry_after_6_days", description = "Retry after 6 days" }
"29" = { recommended_action = "retry_after_8_days", description = "Retry after 8 days" }
"30" = { recommended_action = "retry_after_10_days", description = "Retry after 10 days" }

[default-configs.click_to_pay_supported_connector]
value = false
