# Superposition Seed Configuration for Hyperswitch
# This file contains dimensions and default configs for local development.
# Dimensions define the axes along which configuration can be overridden.
# Default configs define the baseline values used when no override matches.

[[dimensions]]
dimension = "organization_id"
position = 1
schema = { type = "string" }
description = "Organization identifier"
change_reason = "Initial setup"

[[dimensions]]
dimension = "merchant_id"
position = 2
schema = { type = "string" }
description = "Merchant identifier"
change_reason = "Initial setup"

[[dimensions]]
dimension = "profile_id"
position = 3
schema = { type = "string" }
description = "Business profile identifier"
change_reason = "Initial setup"

[[dimensions]]
dimension = "connector"
position = 4
schema = { type = "string" }
description = "Payment connector identifier (e.g. stripe, adyen)"
change_reason = "Initial setup"

[[default_configs]]
key = "requires_cvv"
value = true
schema = { type = "boolean" }
description = "Whether CVV is required for payments"
change_reason = "Initial setup"

[[default_configs]]
key = "implicit_customer_update"
value = false
schema = { type = "boolean" }
description = "Whether to implicitly update customer details on payment"
change_reason = "Initial setup"

[[default_configs]]
key = "payout_tracker_mapping"
schema = { type = "object" }
description = "Payout sync retry mapping configuration per connector"
change_reason = "Initial setup"

[default_configs.value]
start_after = 60
frequencies = [[300, 5]]
